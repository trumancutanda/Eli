<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli AI Assistant</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        #clock {
            font-size: 8rem;
            font-weight: 300;
            margin-bottom: 20px;
        }

        #status-container {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .visualizer {
            display: flex;
            align-items: center;
            gap: 5px;
            height: 50px;
            display: none;
        }

        .bar {
            width: 5px;
            height: 20px;
            background: #00f2ff;
            border-radius: 10px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { height: 10px; }
            50% { height: 40px; }
        }

        #response-text {
            font-size: 1.5rem;
            max-width: 80%;
            margin-top: 20px;
            color: #ccc;
            height: 100px;
            overflow: hidden;
        }

        #setup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="setup-overlay" onclick="startAssistant()">
        <h1>Toca para activar a Eli</h1>
    </div>

    <div id="clock">00:00</div>
    
    <div id="status-container">
        <div id="visualizer" class="visualizer">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
        </div>
        <p id="status-label">Esperando palabra mágica...</p>
    </div>

    <div id="response-text">Di "Eli" seguido de tu pregunta</div>

    <script>
        const API_KEY = "AIzaSyDDcXk5i-DyJC3QBmanGyH-NXkeHLapZ_w";
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        let recognition;
        const clockEl = document.getElementById('clock');
        const statusLabel = document.getElementById('status-label');
        const responseText = document.getElementById('response-text');
        const visualizer = document.getElementById('visualizer');

        // Actualizar reloj
        function updateClock() {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function startAssistant() {
            document.getElementById('setup-overlay').style.display = 'none';
            initSpeechRecognition();
        }

        function initSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                const last = event.results.length - 1;
                const text = event.results[last][0].transcript.toLowerCase().trim();
                
                console.log("Escuchado:", text);

                if (text.includes("eli")) {
                    const query = text.split("eli")[1].trim();
                    if (query.length > 0) {
                        askGemini(query);
                    }
                }
            };

            recognition.onend = () => {
                recognition.start(); // Reiniciar escucha automática
            };

            recognition.start();
            statusLabel.innerText = "Escuchando: 'Eli...'";
        }

        async function askGemini(prompt) {
            statusLabel.innerText = "Pensando...";
            visualizer.style.display = "flex";
            
            try {
                const response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                responseText.innerText = aiResponse;
                speak(aiResponse);

            } catch (error) {
                console.error(error);
                statusLabel.innerText = "Error de conexión";
            } finally {
                visualizer.style.display = "none";
            }
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.onstart = () => {
                recognition.stop(); // No escucharse a sí mismo
            };
            utterance.onend = () => {
                statusLabel.innerText = "Esperando palabra mágica...";
                recognition.start();
            };
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
