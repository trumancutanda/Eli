<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli Assistant Pro - AutoUpdate</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        #clock { font-size: 6rem; color: #222; margin-bottom: 5px; }
        #status-label { color: #00f2ff; font-weight: bold; letter-spacing: 2px; }
        #model-info { color: #444; font-size: 0.7rem; margin-top: 5px; }
        #heard-text { font-style: italic; color: #555; margin: 20px 0; font-size: 1.1rem; min-height: 1.5em; }
        #response-text { font-size: 1.5rem; max-width: 85%; color: #eee; max-height: 40vh; overflow-y: auto; }
        #error-log { color: #ff5555; font-size: 0.8rem; margin-top: 20px; font-family: monospace; }
        #setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
        .active { color: #00ff00 !important; }
    </style>
</head>
<body>

    <div id="setup-overlay" onclick="startAssistant()">
        <div style="border: 2px solid #00f2ff; padding: 30px; border-radius: 50px;">
            <h2>INICIAR ASISTENTE DINÁMICO</h2>
            <p>Configurando inteligencia...</p>
        </div>
    </div>

    <div id="clock">00:00</div>
    <div id="status-label">CONECTANDO...</div>
    <div id="model-info">Detectando mejor modelo...</div>
    <div id="heard-text">...</div>
    <div id="response-text">Cargando...</div>
    <div id="error-log"></div>

    <script>
        const API_KEY = "AIzaSyDDcXk5i-DyJC3QBmanGyH-NXkeHLapZ_w";
        let CURRENT_MODEL = ""; // Se llenará dinámicamente
        let recognition;
        
        const statusLabel = document.getElementById('status-label');
        const modelInfo = document.getElementById('model-info');
        const heardText = document.getElementById('heard-text');
        const responseTextDiv = document.getElementById('response-text');
        const errorLog = document.getElementById('error-log');

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 1. FUNCIÓN PARA BUSCAR EL MODELO COMPATIBLE
        async function discoverBestModel() {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
                const data = await response.json();
                
                if (!data.models) throw new Error("No se pudieron listar los modelos.");

                // Filtrar modelos que soporten generación de contenido
                const availableModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent"));
                
                // Prioridad 1: Cualquier modelo que contenga "flash"
                let chosen = availableModels.find(m => m.name.toLowerCase().includes("flash"));
                
                // Prioridad 2: Si no hay flash, buscar "pro"
                if (!chosen) chosen = availableModels.find(m => m.name.toLowerCase().includes("pro"));
                
                // Prioridad 3: El primero de la lista
                if (!chosen) chosen = availableModels[0];

                CURRENT_MODEL = chosen.name; // Ej: "models/gemini-2.0-flash"
                modelInfo.innerText = `Cerebro: ${CURRENT_MODEL.split('/').pop()}`;
                statusLabel.innerText = "ELI LISTA";
                responseTextDiv.innerText = "Di 'Eli' para empezar";
                
            } catch (e) {
                errorLog.innerText = "Error descubriendo modelo: " + e.message;
            }
        }

        async function startAssistant() {
            document.getElementById('setup-overlay').style.display = 'none';
            await discoverBestModel();
            initSpeech();
        }

        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onstart = () => statusLabel.classList.add('active');
            
            recognition.onresult = (event) => {
                let text = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    text += event.results[i][0].transcript;
                }
                heardText.innerText = text.toLowerCase();

                if (text.toLowerCase().includes("eli") && event.results[event.results.length - 1].isFinal) {
                    const query = text.toLowerCase().split("eli").pop().trim();
                    if (query.length > 2) askGemini(query);
                }
            };

            recognition.onend = () => recognition.start();
            recognition.start();
        }

        async function askGemini(prompt) {
            if (!CURRENT_MODEL) return;
            statusLabel.innerText = "PENSANDO...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/${CURRENT_MODEL}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                responseTextDiv.innerText = aiText;
                speak(aiText);
            } catch (e) {
                errorLog.innerText = "Error en consulta: " + e.message;
            }
        }

        function speak(text) {
            const clean = text.replace(/[*#]/g, "");
            const utterance = new SpeechSynthesisUtterance(clean);
            utterance.lang = 'es-ES';
            utterance.onstart = () => recognition.stop();
            utterance.onend = () => {
                statusLabel.innerText = "ESCUCHANDO";
                recognition.start();
            };
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
