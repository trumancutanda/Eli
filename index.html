<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli AI Assistant v3</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; text-align: center;
        }
        #clock { font-size: 5rem; color: #333; margin-bottom: 10px; }
        #status-label { color: #00f2ff; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
        #heard-text { font-style: italic; color: #555; margin-bottom: 20px; font-size: 1.1rem; min-height: 1.2em; }
        #response-text { font-size: 1.4rem; max-width: 80%; line-height: 1.3; color: #ddd; max-height: 40vh; overflow-y: auto; }
        #error-log { color: #ff4444; font-size: 0.8rem; margin-top: 20px; font-family: monospace; }
        
        #setup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; align-items: center;
            justify-content: center; z-index: 100; cursor: pointer;
        }
        .active { color: #00ff00 !important; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

    <div id="setup-overlay" onclick="startAssistant()">
        <div style="border: 2px solid #00f2ff; padding: 30px; border-radius: 50px;">
            <h2>TOCA PARA INICIAR A ELI</h2>
            <p>Asegúrate de permitir el micrófono</p>
        </div>
    </div>

    <div id="clock">00:00</div>
    <div id="status-label">MODO ESPERA</div>
    <div id="heard-text">...</div>
    <div id="response-text">Di "Eli" y haz tu pregunta</div>
    <div id="error-log"></div>

    <script>
        const API_KEY = "AIzaSyDDcXk5i-DyJC3QBmanGyH-NXkeHLapZ_w";
        // Usamos la v1beta que es más flexible para navegadores
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        let recognition;
        const statusLabel = document.getElementById('status-label');
        const heardText = document.getElementById('heard-text');
        const responseText = document.getElementById('response-text');
        const errorLog = document.getElementById('error-log');
        const clockEl = document.getElementById('clock');

        function updateClock() {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function startAssistant() {
            document.getElementById('setup-overlay').style.display = 'none';
            initSpeech();
        }

        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                errorLog.innerText = "Error: Navegador no compatible con SpeechRecognition.";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onstart = () => {
                statusLabel.innerText = "ESCUCHANDO";
                statusLabel.classList.add('active');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                const fullText = (finalTranscript || interimTranscript).toLowerCase();
                heardText.innerText = fullText;

                // Gatillo para Eli
                if (fullText.includes("eli") || fullText.includes("ely") || fullText.includes("él y")) {
                    if (finalTranscript) {
                        const parts = fullText.split(/eli|ely|él y/);
                        const query = parts[parts.length - 1].trim();
                        if (query.length > 2) {
                            askGemini(query);
                        }
                    }
                }
            };

            recognition.onerror = (e) => {
                errorLog.innerText = "Error Micrófono: " + e.error;
                if (e.error === 'network') setTimeout(() => recognition.start(), 1000);
            };

            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }

        async function askGemini(prompt) {
            statusLabel.innerText = "PENSANDO...";
            statusLabel.classList.remove('active');
            errorLog.innerText = ""; // Limpiar errores previos
            
            try {
                const response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`Código ${response.status}: ${errorData.error.message}`);
                }

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                responseText.innerText = aiResponse;
                speak(aiResponse);

            } catch (error) {
                responseText.innerText = "Error de conexión.";
                errorLog.innerText = "Detalle del error: " + error.message;
                console.error(error);
                // Si falla, volvemos a escuchar tras 3 segundos
                setTimeout(() => {
                    statusLabel.innerText = "ESCUCHANDO";
                    statusLabel.classList.add('active');
                }, 3000);
            }
        }

        function speak(text) {
            // Limpiamos el texto de asteriscos y formato markdown que envía Gemini
            const cleanText = text.replace(/\*/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'es-ES';
            
            utterance.onstart = () => { if(recognition) recognition.stop(); };
            utterance.onend = () => { if(recognition) recognition.start(); };
            
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
