<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli Assistant Ultra 2026</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        #clock { font-size: 5rem; color: #222; margin-bottom: 5px; }
        #status-label { color: #00f2ff; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        #model-info { color: #555; font-size: 0.75rem; margin-top: 5px; }
        #response-text { font-size: 1.5rem; max-width: 85%; color: #ddd; margin-top: 20px; max-height: 40vh; overflow-y: auto; }
        #debug-console { position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(20,20,20,0.9); color: #00ff00; font-family: monospace; font-size: 0.7rem; text-align: left; padding: 10px; border-radius: 5px; max-height: 100px; overflow-y: auto; border: 1px solid #333; }
        #setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
        .active { color: #00ff00 !important; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

    <div id="setup-overlay" onclick="startAssistant()">
        <div style="border: 2px solid #00f2ff; padding: 30px; border-radius: 50px;">
            <h2 style="margin:0">TOCA PARA DESPERTAR A ELI</h2>
            <p style="color: #666">Iniciando Cerebro v2026...</p>
        </div>
    </div>

    <div id="clock">00:00</div>
    <div id="status-label">ESPERANDO...</div>
    <div id="model-info">Detectando inteligencia...</div>
    <div id="response-text">Pulsa el botón para empezar.</div>
    
    <div id="debug-console">Iniciando consola...</div>

    <script>
        const API_KEY = "AIzaSyDDcXk5i-DyJC3QBmanGyH-NXkeHLapZ_w";
        let CURRENT_MODEL = "";
        
        const debug = (msg) => {
            const consoleEl = document.getElementById('debug-console');
            consoleEl.innerHTML += `> ${msg}<br>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        };

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function startAssistant() {
            document.getElementById('setup-overlay').style.display = 'none';
            debug("Buscando modelos compatibles...");
            await smartModelDiscovery();
            initSpeech();
        }

        // DISCOVERY INTELIGENTE: Intenta listar, y si falla, usa una lista segura de 2026
        async function smartModelDiscovery() {
            const statusLabel = document.getElementById('status-label');
            const modelInfo = document.getElementById('model-info');

            try {
                // Intento 1: Listar modelos oficialmente (usando v1 en 2026)
                debug("Intentando listar modelos desde API v1...");
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${API_KEY}`);
                
                if (response.ok) {
                    const data = await response.json();
                    const flashModel = data.models.find(m => m.name.includes("flash") && m.supportedGenerationMethods.includes("generateContent"));
                    if (flashModel) {
                        CURRENT_MODEL = flashModel.name;
                        debug(`Modelo dinámico encontrado: ${CURRENT_MODEL}`);
                    }
                }
            } catch (e) {
                debug("Error en ListModels: " + e.message);
            }

            // Intento 2: Si no se pudo listar, usamos "Safe Mode" con modelos de 2026
            if (!CURRENT_MODEL) {
                debug("Safe Mode: Probando modelos predefinidos de 2026...");
                const fallbackList = [
                    "models/gemini-2.0-flash", // El estándar en 2026
                    "models/gemini-1.5-flash",
                    "models/gemini-pro"
                ];

                for (const modelName of fallbackList) {
                    debug(`Probando ${modelName}...`);
                    try {
                        const testResp = await fetch(`https://generativelanguage.googleapis.com/v1/${modelName}:generateContent?key=${API_KEY}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: "ping" }] }] })
                        });
                        if (testResp.ok) {
                            CURRENT_MODEL = modelName;
                            debug(`¡Conectado con ${modelName}!`);
                            break;
                        }
                    } catch (err) {
                        debug(`${modelName} no disponible.`);
                    }
                }
            }

            if (CURRENT_MODEL) {
                modelInfo.innerText = `Cerebro: ${CURRENT_MODEL.split('/').pop()}`;
                statusLabel.innerText = "ELI LISTA";
                statusLabel.classList.add('active');
            } else {
                debug("ERROR CRÍTICO: Ningún modelo respondió.");
                document.getElementById('response-text').innerText = "Error: Comprueba tu conexión o API Key.";
            }
        }

        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                debug("Navegador no soporta voz.");
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let text = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    text += event.results[i][0].transcript;
                }
                if (text.toLowerCase().includes("eli") && event.results[event.results.length - 1].isFinal) {
                    const query = text.toLowerCase().split("eli").pop().trim();
                    if (query.length > 2) askGemini(query);
                }
            };

            recognition.onend = () => recognition.start();
            recognition.start();
            debug("Micrófono abierto. Di 'Eli'...");
        }

        async function askGemini(prompt) {
            document.getElementById('status-label').innerText = "PENSANDO...";
            debug(`Preguntando a ${CURRENT_MODEL}...`);
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/${CURRENT_MODEL}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('response-text').innerText = aiText;
                speak(aiText);
            } catch (e) {
                debug("Error en respuesta: " + e.message);
            }
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#]/g, ""));
            utterance.lang = 'es-ES';
            utterance.onend = () => document.getElementById('status-label').innerText = "ELI LISTA";
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
